---
- name: Check extra file sources
  ansible.builtin.stat:
    path: "{{ (item.src is match('^/')) | ternary(item.src, deploy_project_src ~ '/' ~ item.src) }}"
  delegate_to: localhost
  loop: "{{ deploy_extra_files }}"
  register: deploy_extra_files_stats
  loop_control:
    label: "{{ item.src }}"

- name: Validate extra file sources exist
  ansible.builtin.assert:
    that:
      - deploy_extra_files_stats.results[item_index].stat.exists
    fail_msg: "Extra file source does not exist: {{ item.src }}"
  loop: "{{ deploy_extra_files }}"
  loop_control:
    index_var: item_index
    label: "{{ item.src }}"

- name: Create parent directories for extra files
  ansible.builtin.file:
    path: "{{ ((item.dst is match('^/')) | ternary(item.dst, deploy_dir ~ '/' ~ item.dst)) | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ deploy_extra_files }}"
  loop_control:
    label: "{{ item.dst }}"

- name: Copy extra directories to remote server
  ansible.posix.synchronize:
    src: "{{ deploy_extra_files_stats.results[item_index].stat.path }}/"
    dest: "{{ (item.dst is match('^/')) | ternary(item.dst, deploy_dir ~ '/' ~ item.dst) }}/"
    rsync_opts:
      - "--delete-after"
  loop: "{{ deploy_extra_files }}"
  loop_control:
    index_var: item_index
    label: "{{ item.dst }}"
  when: deploy_extra_files_stats.results[item_index].stat.isdir

- name: Copy extra files to remote server
  ansible.builtin.copy:
    src: "{{ deploy_extra_files_stats.results[item_index].stat.path }}"
    dest: "{{ (item.dst is match('^/')) | ternary(item.dst, deploy_dir ~ '/' ~ item.dst) }}"
    mode: preserve
  loop: "{{ deploy_extra_files }}"
  loop_control:
    index_var: item_index
    label: "{{ item.dst }}"
  when: not deploy_extra_files_stats.results[item_index].stat.isdir
